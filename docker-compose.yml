# Production-режим: PostgreSQL + MinIO (S3-совместимое хранилище).
# Для локальной разработки это НЕ обязательно — по умолчанию приложение
# использует SQLite и локальное файловое хранилище.
#
#   docker compose up -d            # поднять Postgres + MinIO
#   (затем в server/.env: DATABASE_PROVIDER=postgresql, STORAGE_DRIVER=s3)

services:
  db:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-совместимое хранилище файлов (спецификации, договоры, ТТН/УПД, акты)
  minio:
    image: minio/minio:latest
    container_name: crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web-консоль
    volumes:
      - crm_miniodata:/data

volumes:
  crm_pgdata:
  crm_miniodata:
